# Tier B only. Netlify serves the static SPA + public/data/*.json artifacts.
# It runs NO Python and NO heavy compute — the pipeline (Tier A) runs offline
# and commits its JSON output to public/data (see pipeline/README.md).

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# Long-cache the hashed JS/CSS bundles; the HTML stays revalidated so new
# deploys are picked up immediately.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Data artifacts are revalidated each load so a fresh pipeline run shows up
# without a full redeploy of the shell.
[[headers]]
  for = "/data/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# SPA fallback for client-side routing.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Functions are OPTIONAL and unused by default — the app needs no backend.
# Uncomment only if you add a TS query/subset endpoint (spec §14).
# [functions]
#   directory = "netlify/functions"
